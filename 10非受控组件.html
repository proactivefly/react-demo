<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.bootcss.com/babel-standalone/6.22.1/babel.min.js"></script>
</head>
<body>
<script type="text/babel">
  class Clock extends React.Component{
    constructor(props){
      super(props);
      this.state=({
        input:''
      })
    }
    componentDidMount(){
    }
    render(){
      return(
        <div>
            我的名字是：
          <input type="text" defaultValue="BOSS" ref={(input)=>{this.input=input}}/>
            <p>{this.input}</p>
        </div>
      )
    }
  }

  ReactDOM.render(
    <Clock/>,
    document.getElementById('app')
  )
</script>
<div id="app">

</div>
