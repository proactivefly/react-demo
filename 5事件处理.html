<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@16/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@16/umd/react-dom.development.js"></script>
    <script src="https://cdn.bootcss.com/babel-standalone/6.22.1/babel.min.js"></script>
</head>
<body>
<script type="text/babel">
  class Clock extends React.Component{
    constructor(props){
      super(props);
      this.this3=this.this3.bind(this)
      this.state = {c:3};
    }
    hindClick=()=>{
      console.log(this)  //组件本身
    }

    nothis(){
      console.log(this) //无this
    }
    this3(){
      console.log(this)
    }
    render(){
      return(
        <div>
          <h1>Hello, world!</h1>
            <h1 onClick={this.hindClick}>有this</h1>
            <h1 onClick={this.this3}>constrouctor中声明this</h1>
            <h1 onClick={this.nothis}>无this</h1>
        </div>
      )
    }
  }

  ReactDOM.render(
    <Clock/>,
    document.getElementById('app')
  )
</script>
<div id="app">

</div>
</body>
</html>
